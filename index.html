<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bez cigareta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-mid: #5DCAA5;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --text: #1a1a1a;
    --text-muted: #666;
    --text-hint: #999;
    --border: rgba(0,0,0,0.1);
    --surface: #f5f3ef;
    --card: #fff;
  }
 
  body {
    font-family: 'Syne', sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1.5rem;
  }
 
  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(29,158,117,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
 
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.6s ease both;
  }
  .header .icon { font-size: 2.5rem; margin-bottom: 0.5rem; display: block; }
  .header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; }
  .header h1 span { color: var(--green); }
  .header p { font-size: 0.875rem; color: var(--text-muted); margin-top: 0.4rem; font-family: 'DM Mono', monospace; }
 
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 700px;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s 0.1s ease both;
  }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1rem; text-align: center; }
  .stat-card.highlight { background: var(--green); border-color: transparent; color: #fff; }
  .stat-card.highlight .stat-label, .stat-card.highlight .stat-sub { color: rgba(255,255,255,0.7); }
  .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; font-family: 'DM Mono', monospace; }
  .stat-value { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1; margin-bottom: 0.3rem; }
  .stat-sub { font-size: 0.72rem; color: var(--text-hint); font-family: 'DM Mono', monospace; }
 
  .progress-wrap {
    width: 100%; max-width: 700px;
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
    animation: fadeUp 0.6s 0.2s ease both;
  }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .progress-header span { font-size: 0.75rem; font-family: 'DM Mono', monospace; color: var(--text-muted); }
  .progress-header strong { font-size: 0.75rem; font-family: 'DM Mono', monospace; color: var(--green); }
  .progress-bg { background: var(--green-light); border-radius: 8px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 8px; transition: width 1s ease; }
 
  .table-section { width: 100%; max-width: 700px; animation: fadeUp 0.6s 0.3s ease both; }
  .table-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-bottom: 0.75rem; }
  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
 
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead th {
    background: #f9f8f5; font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-muted); font-family: 'DM Mono', monospace;
    padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 400;
  }
 
  /* Base row */
  tbody tr td {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace; font-size: 0.8rem;
    color: var(--text-hint);
  }
  tbody tr:last-child td { border-bottom: none; }
 
  /* Past hour rows (inside expanded day) */
  tbody tr.row-hour-past td { color: var(--text-muted); }
  tbody tr.row-hour-future td { color: var(--text-hint); }
 
  /* Current row */
  tbody tr.row-current { background: #f0fdf7; }
  tbody tr.row-current td { color: var(--green); font-weight: 500; }
 
  /* Group summary rows (day / month / year) */
  tbody tr.row-group td {
    color: var(--text);
    font-weight: 500;
    cursor: pointer;
    user-select: none;
    background: #fafaf8;
  }
  tbody tr.row-group:hover td { background: #f3f3ef; }
  tbody tr.row-group.row-group-active td { background: var(--green-light); color: var(--green); }
  tbody tr.row-group.row-future td { color: var(--text-hint); font-weight: 400; background: var(--card); }
 
  /* Hidden child rows */
  tbody tr.child-row { display: none; }
  tbody tr.child-row.visible { display: table-row; }
 
  /* Indent child rows */
  tbody tr.child-row td:first-child { padding-left: 32px; }
  tbody tr.child-child-row td:first-child { padding-left: 48px; }
 
  .badge {
    display: inline-block; font-size: 0.6rem; padding: 2px 7px; border-radius: 20px;
    background: var(--green-light); color: var(--green); margin-left: 6px;
    vertical-align: middle; font-family: 'Syne', sans-serif; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .milestone {
    display: inline-block; font-size: 0.6rem; padding: 2px 7px; border-radius: 20px;
    background: var(--amber-light); color: var(--amber); margin-left: 4px;
    vertical-align: middle; font-family: 'Syne', sans-serif; font-weight: 700;
  }
  .toggle-icon { font-style: normal; margin-right: 6px; font-size: 0.7rem; color: var(--text-hint); }
 
  .footer { margin-top: 2rem; text-align: center; font-size: 0.7rem; color: var(--text-hint); font-family: 'DM Mono', monospace; animation: fadeUp 0.6s 0.4s ease both; }
 
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
 
  @media (max-width: 500px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .stats-grid .stat-card:last-child { grid-column: 1 / -1; }
  }
</style>
</head>
<body>
 
<div class="header">
  <span class="icon">🚭</span>
  <h1>Bez cigareta <span>= pare u džepu</span></h1>
  <p>od 31.03.2026. u 22:00</p>
</div>
 
<div class="stats-grid">
  <div class="stat-card highlight">
    <div class="stat-label">Vreme bez cigareta</div>
    <div class="stat-value" id="elapsed">0h 0m</div>
    <div class="stat-sub" id="days-label">danas</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Uštedeo si</div>
    <div class="stat-value" id="saved">0 RSD</div>
    <div class="stat-sub" id="cig-count">0 cigareta manje</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Sledeća uštevina</div>
    <div class="stat-value" id="next-save">18 RSD</div>
    <div class="stat-sub" id="next-in">za 60 min</div>
  </div>
</div>
 
<div class="progress-wrap">
  <div class="progress-header">
    <span id="progress-label">napredak tekućeg sata</span>
    <strong id="progress-pct">0%</strong>
  </div>
  <div class="progress-bg">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>
 
<div class="table-section">
  <div class="table-title">Statistika</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Period</th>
          <th>Po periodu (RSD)</th>
          <th>Cigareta manje</th>
          <th>Ukupno (RSD)</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>
 
<div class="footer">osvežava se svakih 60 sekundi &nbsp;·&nbsp; drži se! 💪</div>
 
<script>
const START = new Date('2026-03-31T22:00:00');
const RSD_PER_HOUR = 440 / 24;
const CIGS_PER_HOUR = 20 / 24;
const RSD_PER_DAY = 440;
const CIGS_PER_DAY = 20;
const RSD_PER_MONTH = 440 * 30;
const CIGS_PER_MONTH = 20 * 30;
const RSD_PER_YEAR = 440 * 365;
const CIGS_PER_YEAR = 20 * 365;
 
function fmt(n, dec=0) {
  return n.toLocaleString('sr-RS', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}
function formatDuration(ms) {
  const totalMins = Math.floor(ms / 60000);
  const h = Math.floor(totalMins / 60);
  const m = totalMins % 60;
  return h + 'h ' + m + 'm';
}
 
// Toggle expand/collapse group rows
function toggleGroup(groupId) {
  const children = document.querySelectorAll(`[data-parent="${groupId}"]`);
  const btn = document.querySelector(`[data-group-id="${groupId}"]`);
  const isOpen = btn && btn.dataset.open === '1';
 
  children.forEach(row => {
    if (isOpen) {
      row.classList.remove('visible');
      // Also hide grandchildren
      const childId = row.dataset.groupId;
      if (childId) {
        document.querySelectorAll(`[data-parent="${childId}"]`).forEach(r => r.classList.remove('visible'));
        row.dataset.open = '0';
        const icon = row.querySelector('.toggle-icon');
        if (icon) icon.textContent = '▶';
      }
    } else {
      row.classList.add('visible');
    }
  });
 
  if (btn) {
    btn.dataset.open = isOpen ? '0' : '1';
    const icon = btn.querySelector('.toggle-icon');
    if (icon) icon.textContent = isOpen ? '▶' : '▼';
  }
}
 
function makeRow(cells, classes, groupId, parentId, isToggleable) {
  const tr = document.createElement('tr');
  let allClasses = classes;
  if (parentId) { tr.dataset.parent = parentId; allClasses += ' child-row'; }
  if (groupId) { tr.dataset.groupId = groupId; }
  tr.className = allClasses;
 
  cells.forEach((c, i) => {
    const td = document.createElement('td');
    td.innerHTML = c;
    tr.appendChild(td);
  });
 
  if (isToggleable) {
    tr.style.cursor = 'pointer';
    tr.addEventListener('click', () => toggleGroup(groupId));
  }
 
  return tr;
}
 
function buildTable(elapsedHours) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
 
  const completedHours = Math.floor(elapsedHours);
  const completedDays = Math.floor(completedHours / 24);
  const completedMonths = Math.floor(completedDays / 30);
  const completedYears = Math.floor(completedDays / 365);
 
  // How many full periods to show ahead
  const showAheadDays = Math.max(completedDays + 2, 7);
  const showAheadMonths = Math.max(completedMonths + 2, 3);
  const showAheadYears = Math.max(completedYears + 1, 2);
 
  // ---- HOURS within current day (always shown at top, ungrouped if day 0) ----
  const currentDayIndex = completedDays; // 0-based day index
 
  // Group by day
  // Days start from day 0 (hours 1-24), day 1 (hours 25-48), etc.
  // We show all completed days as collapsed groups, current day expanded, future days collapsed
 
  // First: show hours of day 0 if still in day 0
  // Otherwise show day groups
 
  let currentHourRow = null;
 
  // --- Build day groups ---
  const totalDaysToShow = showAheadDays;
 
  for (let d = 0; d < totalDaysToShow; d++) {
    const dayNum = d + 1; // display number
    const dayStartHour = d * 24 + 1;
    const dayEndHour = (d + 1) * 24;
    const dayTotalRSD = dayEndHour * RSD_PER_HOUR;
    const dayTotalCigs = dayEndHour * CIGS_PER_HOUR;
    const dayGroupId = 'day-' + d;
 
    const isDayComplete = completedHours >= dayEndHour;
    const isDayCurrent = !isDayComplete && completedHours >= dayStartHour - 1;
    const isDayFuture = completedHours < dayStartHour - 1;
 
    let dayClass = 'row-group';
    if (isDayCurrent) dayClass += ' row-group-active';
    if (isDayFuture) dayClass += ' row-future';
 
    const dayBadge = isDayCurrent ? '<span class="badge">danas</span>' : '';
    const dayMilestone = dayNum === 1 ? '<span class="milestone">1 dan!</span>'
                       : dayNum === 7 ? '<span class="milestone">1 nedelja!</span>'
                       : dayNum === 14 ? '<span class="milestone">2 nedelje!</span>'
                       : '';
 
    const icon = '<i class="toggle-icon">▶</i>';
 
    const dayRow = makeRow([
      icon + dayNum + '. dan' + dayBadge + dayMilestone,
      '+ ' + fmt(RSD_PER_DAY, 0) + ' RSD',
      fmt(CIGS_PER_DAY, 0),
      fmt(dayTotalRSD, 0) + ' RSD'
    ], dayClass, dayGroupId, null, true);
 
    tbody.appendChild(dayRow);
 
    // Hour children
    for (let h = dayStartHour; h <= dayEndHour; h++) {
      const isCurrentHour = h === completedHours + 1;
      const isPastHour = h <= completedHours;
      let hourClass = isPastHour ? 'row-hour-past' : isCurrentHour ? 'row-current' : 'row-hour-future';
 
      let label;
      const hInDay = h - d * 24;
      label = hInDay + '. sat';
 
      const badge = isCurrentHour ? '<span class="badge">sada</span>' : '';
 
      const hourRow = makeRow([
        label + badge,
        '+ ' + fmt(RSD_PER_HOUR, 1) + ' RSD',
        fmt(h * CIGS_PER_HOUR, 1),
        fmt(h * RSD_PER_HOUR, 0) + ' RSD'
      ], hourClass, null, dayGroupId, false);
 
      tbody.appendChild(hourRow);
 
      if (isCurrentHour) currentHourRow = hourRow;
 
      // Auto-expand current day
      if (isDayCurrent) {
        hourRow.classList.add('visible');
        dayRow.dataset.open = '1';
        const ic = dayRow.querySelector('.toggle-icon');
        if (ic) ic.textContent = '▼';
      }
    }
  }
 
  // --- Month groups (only show if we have completed days >= 30) ---
  if (completedDays >= 28 || showAheadMonths > 0) {
    for (let m = 0; m < showAheadMonths; m++) {
      const monthNum = m + 1;
      const monthStartDay = m * 30;
      const monthEndDay = (m + 1) * 30;
      const monthTotalRSD = monthEndDay * RSD_PER_DAY;
      const monthTotalCigs = monthEndDay * CIGS_PER_DAY;
      const monthGroupId = 'month-' + m;
 
      const isMonthComplete = completedDays >= monthEndDay;
      const isMonthCurrent = !isMonthComplete && completedDays >= monthStartDay;
      const isMonthFuture = completedDays < monthStartDay;
 
      if (isMonthFuture && completedDays < monthStartDay - 7) continue; // don't show too far ahead
 
      let monthClass = 'row-group';
      if (isMonthCurrent) monthClass += ' row-group-active';
      if (isMonthFuture) monthClass += ' row-future';
 
      const monthMilestone = monthNum === 1 ? '<span class="milestone">1 mesec!</span>'
                           : monthNum === 3 ? '<span class="milestone">3 meseca!</span>'
                           : monthNum === 6 ? '<span class="milestone">6 meseci!</span>'
                           : monthNum === 12 ? '<span class="milestone">1 godina!</span>'
                           : '';
 
      const icon = '<i class="toggle-icon">▶</i>';
 
      const monthRow = makeRow([
        icon + monthNum + '. mesec' + monthMilestone,
        '+ ' + fmt(RSD_PER_MONTH, 0) + ' RSD',
        fmt(CIGS_PER_MONTH, 0),
        fmt(monthTotalRSD, 0) + ' RSD'
      ], monthClass, monthGroupId, null, true);
 
      tbody.appendChild(monthRow);
 
      // Day children inside month
      for (let d = monthStartDay; d < monthEndDay; d++) {
        const dayNum = d + 1;
        const isDayComp = completedDays > d;
        const isDayCurr = completedDays === d;
        let dc = isDayComp ? 'row-hour-past' : isDayCurr ? 'row-current' : 'row-hour-future';
 
        const db = isDayCurr ? '<span class="badge">danas</span>' : '';
 
        const dr = makeRow([
          dayNum + '. dan' + db,
          '+ ' + fmt(RSD_PER_DAY, 0) + ' RSD',
          fmt(CIGS_PER_DAY, 0),
          fmt((d + 1) * RSD_PER_DAY, 0) + ' RSD'
        ], dc, null, monthGroupId, false);
 
        tbody.appendChild(dr);
      }
    }
  }
 
  // --- Year groups ---
  for (let y = 0; y < showAheadYears; y++) {
    const yearNum = y + 1;
    const yearStartDay = y * 365;
    const yearEndDay = (y + 1) * 365;
    const yearTotalRSD = yearEndDay * RSD_PER_DAY;
    const yearTotalCigs = yearEndDay * CIGS_PER_DAY;
    const yearGroupId = 'year-' + y;
 
    const isYearComplete = completedDays >= yearEndDay;
    const isYearCurrent = !isYearComplete && completedDays >= yearStartDay;
    const isYearFuture = completedDays < yearStartDay;
 
    if (isYearFuture && completedDays < yearStartDay - 30) continue;
 
    let yearClass = 'row-group';
    if (isYearCurrent) yearClass += ' row-group-active';
    if (isYearFuture) yearClass += ' row-future';
 
    const icon = '<i class="toggle-icon">▶</i>';
 
    const yearRow = makeRow([
      icon + yearNum + '. godina',
      '+ ' + fmt(RSD_PER_YEAR, 0) + ' RSD',
      fmt(CIGS_PER_YEAR, 0),
      fmt(yearTotalRSD, 0) + ' RSD'
    ], yearClass, yearGroupId, null, true);
 
    tbody.appendChild(yearRow);
 
    // Month children inside year
    for (let m = y * 12; m < (y + 1) * 12; m++) {
      const mn = m + 1;
      const mStartDay = m * 30;
      const mEndDay = (m + 1) * 30;
      const isMComp = completedDays >= mEndDay;
      const isMCurr = !isMComp && completedDays >= mStartDay;
      let mc = isMComp ? 'row-hour-past' : isMCurr ? 'row-current' : 'row-hour-future';
 
      const mb = isMCurr ? '<span class="badge">ovaj mesec</span>' : '';
 
      const mr = makeRow([
        mn + '. mesec' + mb,
        '+ ' + fmt(RSD_PER_MONTH, 0) + ' RSD',
        fmt(CIGS_PER_MONTH, 0),
        fmt(mEndDay * RSD_PER_DAY, 0) + ' RSD'
      ], mc, null, yearGroupId, false);
 
      tbody.appendChild(mr);
    }
  }
 
  // Scroll to current hour
  if (currentHourRow) {
    setTimeout(() => currentHourRow.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
  }
}
 
function update() {
  const now = new Date();
  const elapsedMs = now - START;
  if (elapsedMs < 0) { document.getElementById('elapsed').textContent = 'Uskoro!'; return; }
 
  const elapsedHours = elapsedMs / 3600000;
  const completedHours = Math.floor(elapsedHours);
  const frac = elapsedHours - completedHours;
  const days = Math.floor(elapsedMs / 86400000);
 
  document.getElementById('elapsed').textContent = formatDuration(elapsedMs);
  document.getElementById('days-label').textContent = days === 0 ? 'danas' : days + (days === 1 ? ' dan' : ' dana');
  document.getElementById('saved').textContent = fmt(elapsedHours * RSD_PER_HOUR) + ' RSD';
  document.getElementById('cig-count').textContent = fmt(elapsedHours * CIGS_PER_HOUR, 1) + ' cigareta manje';
  document.getElementById('next-save').textContent = fmt(RSD_PER_HOUR) + ' RSD';
  document.getElementById('next-in').textContent = 'za ' + Math.ceil((1 - frac) * 60) + ' min';
  const pct = Math.round(frac * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
 
  buildTable(elapsedHours);
}
 
update();
setInterval(update, 60000);
</script>
</body>
</html>
